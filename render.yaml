services:
  - type: web
    name: shootazpoker-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: REAL_MONEY_ENABLED
        value: "false"
      - key: PLAYER_FUNDED_PRIZES_ENABLED
        value: "false"
      - key: PAID_TOURNAMENT_ENTRY_ENABLED
        value: "false"
      - key: CHIP_CASHOUT_ENABLED
        value: "false"

  - type: web
    name: sh0-0ta-poker-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        value: https://shootazpoker-api.onrender.com
