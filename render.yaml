services:
  - type: web
    name: shootazpoker-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: REAL_MONEY_ENABLED
        value: "false"
      - key: PLAYER_FUNDED_PRIZES_ENABLED
        value: "false"
      - key: PAID_TOURNAMENT_ENTRY_ENABLED
        value: "false"
      - key: CHIP_CASHOUT_ENABLED
        value: "false"
      - key: ALLOW_DEMO_PURCHASES
        value: "false"
      # Optional Square / Cash App Pay
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_LOCATION_ID
        sync: false
      - key: SQUARE_WEBHOOK_SIGNATURE_KEY
        sync: false
      # Optional crypto checkout provider
      - key: CRYPTO_PROVIDER
        sync: false
      - key: CRYPTO_API_KEY
        sync: false
      - key: CRYPTO_WEBHOOK_SECRET
        sync: false

  - type: web
    name: shootazpoker
    env: static
    plan: free
    buildCommand: npm install && npm run build --workspace=client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_NAME
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_ENABLE_DEMO_PURCHASES
        value: "false"
